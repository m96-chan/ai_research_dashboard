<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Neural network / constellation lines -->
  <g stroke="#a5b4fc" stroke-width="2" stroke-opacity="0.5" fill="none">
    <line x1="38" y1="32" x2="64" y2="56"/>
    <line x1="90" y1="28" x2="64" y2="56"/>
    <line x1="64" y1="56" x2="42" y2="82"/>
    <line x1="64" y1="56" x2="86" y2="78"/>
    <line x1="42" y1="82" x2="64" y2="102"/>
    <line x1="86" y1="78" x2="64" y2="102"/>
    <line x1="38" y1="32" x2="22" y2="58"/>
    <line x1="22" y1="58" x2="42" y2="82"/>
    <line x1="90" y1="28" x2="106" y2="54"/>
    <line x1="106" y1="54" x2="86" y2="78"/>
  </g>
  <!-- Nodes -->
  <g fill="url(#node)">
    <circle cx="38" cy="32" r="7"/>
    <circle cx="90" cy="28" r="7"/>
    <circle cx="64" cy="56" r="9" fill="#fff"/>
    <circle cx="22" cy="58" r="5"/>
    <circle cx="106" cy="54" r="5"/>
    <circle cx="42" cy="82" r="6"/>
    <circle cx="86" cy="78" r="6"/>
    <circle cx="64" cy="102" r="7"/>
  </g>
  <!-- Center glow -->
  <circle cx="64" cy="56" r="4" fill="#6366f1"/>
</svg>
